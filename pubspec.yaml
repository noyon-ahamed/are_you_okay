name: are_you_okay
description: A safety check-in app with emergency features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

  flutter_native_splash: ^2.4.0

  # State Management
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  freezed_annotation: ^2.4.1

  # Localization
  
  # Security
  
  # Sensors
  sensors_plus: ^4.0.2
  
  # Network
  http: ^1.1.2
  dio: ^5.4.0             
  socket_io_client: ^2.0.3  
  connectivity_plus: ^5.0.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0  
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Notifications
  flutter_local_notifications: ^18.0.0
  
  # URL
  url_launcher: ^6.3.2
  
  # File Storage
  path_provider: ^2.1.1
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Utils
  intl: ^0.20.2           
  uuid: ^4.5.3            
  timeago: ^3.6.0           
  flutter_dotenv: ^5.1.0   
  
  # Phone
  flutter_phone_direct_caller: ^2.1.1
  
  # Audio/Voice
  noise_meter: ^5.0.2
  
  # Background tasks
  workmanager: ^0.9.0
  
  # Image
  image_picker: ^1.0.5
  
  # Animation
  
  # AI
  google_generative_ai: ^0.4.6
  
  # Timezone
  flutter_timezone: ^4.1.1

  # Ads
  google_mobile_ads: ^7.0.0
  flutter_callkit_incoming: ^3.0.0
  wakelock_plus: ^1.4.0
  share_plus: ^12.0.1
  pdf: ^3.11.3
  firebase_messaging: ^16.1.2
  firebase_core: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

    - .env
  
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#006A4E"
  image: assets/images/logo_padded.png
  android_12:
    image: assets/images/logo_padded.png
    color: "#006A4E"
  android: true
  ios: false
  fullscreen: false

